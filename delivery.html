<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CloudPro | Delivery Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        
        #map { 
            height: 250px; 
            width: 100%; 
            border-radius: 35px; 
            margin-bottom: 24px; 
            display: none; 
            border: 6px solid white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .bike-float { animation: float 2.5s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(-2deg); }
        }

        .radar-container { position: relative; width: 140px; height: 140px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; }
        .radar-ring { position: absolute; border: 2px solid #f97316; border-radius: 50%; animation: radar-pulse 2s infinite; opacity: 0; }
        .ring-1 { width: 60%; height: 60%; animation-delay: 0s; }
        .ring-2 { width: 85%; height: 85%; animation-delay: 0.5s; }
        .ring-3 { width: 110%; height: 110%; animation-delay: 1s; }

        @keyframes radar-pulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Toast Animation */
        #toast { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(100px); opacity: 0; pointer-events: none; }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="p-4 sm:p-8 pb-20">

    <audio id="orderDing" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-orange-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3">
        <i class="fas fa-bell animate-bounce"></i>
        <p id="toastMsg" class="text-xs font-black uppercase tracking-widest"></p>
    </div>

    <script>
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const userRole = localStorage.getItem('userRole');
        const userEmail = localStorage.getItem('userEmail');
        
        if (isLoggedIn !== 'true' || userRole !== 'Driver') {
            window.location.href = 'auth.html';
        }
    </script>

    <div id="driverProfileModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[500] flex items-center justify-center p-4 transition-opacity hidden">
        <div class="bg-white w-full max-w-md rounded-[30px] shadow-2xl overflow-hidden p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-4"><i class="fas fa-id-badge"></i></div>
                <h2 class="text-2xl font-black uppercase italic text-slate-900 leading-none">Select Profile</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Choose your identity & zone</p>
            </div>
            
            <div class="space-y-3 mb-6">
                <label class="flex justify-between items-center p-4 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer hover:border-orange-500 has-[:checked]:border-orange-500 has-[:checked]:bg-orange-50 transition-all">
                    <div>
                        <p class="font-black text-slate-900 text-sm uppercase">Raju Bhai</p>
                        <p class="text-[10px] font-bold text-slate-500 uppercase mt-1"><i class="fas fa-motorcycle text-slate-400 mr-1"></i> MH-04-AB-1234</p>
                    </div>
                    <input type="radio" name="driverProfile" value="Raju Bhai (MH-04-AB-1234)" class="accent-orange-500 w-5 h-5">
                </label>

                <label class="flex justify-between items-center p-4 bg-slate-50 border border-slate-200 rounded-2xl cursor-pointer hover:border-orange-500 has-[:checked]:border-orange-500 has-[:checked]:bg-orange-50 transition-all">
                    <div>
                        <p class="font-black text-slate-900 text-sm uppercase">Vikram Singh</p>
                        <p class="text-[10px] font-bold text-slate-500 uppercase mt-1"><i class="fas fa-motorcycle text-slate-400 mr-1"></i> GJ-15-XY-9876</p>
                    </div>
                    <input type="radio" name="driverProfile" value="Vikram Singh (GJ-15-XY-9876)" class="accent-orange-500 w-5 h-5">
                </label>
            </div>

            <div class="border-t border-slate-100 pt-4">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Operating Zone</label>
                <select id="driverZone" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-orange-500 transition-all text-sm font-bold mt-2 cursor-pointer">
                    <option value="All Regions">All Regions (Global View)</option>
                    <option value="Mumbai">Mumbai Region</option>
                    <option value="Vapi">Vapi Region</option>
                    <option value="Silvassa">Silvassa Region</option>
                </select>
            </div>

            <button onclick="saveDriverProfile()" class="w-full bg-slate-900 text-white font-black uppercase tracking-widest py-4 rounded-xl hover:bg-orange-500 transition-all mt-6 shadow-lg">
                Start Shift
            </button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-slate-900 leading-none">DRIVER<span class="text-orange-500">PRO</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1" id="driverNameDisplay">Partner Portal</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-white p-3 px-5 rounded-3xl border border-slate-100 shadow-sm text-right">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Total Pay</p>
                    <p id="walletBalance" class="text-lg font-black text-slate-900 leading-none">₹0</p>
                </div>
                <button onclick="simulateWithdraw()" title="Withdraw Funds" class="w-12 h-12 bg-emerald-500 text-white rounded-2xl flex items-center justify-center hover:bg-slate-900 transition-all shadow-lg shadow-emerald-500/30">
                    <i class="fas fa-money-bill-transfer"></i>
                </button>
                <button onclick="logout()" title="Logout" class="w-12 h-12 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-sm border border-red-100">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <div id="map"></div>

        <section id="uiContainer">
            <div id="searchingState" class="text-center py-10">
                <div class="radar-container">
                    <div class="radar-ring ring-1"></div>
                    <div class="radar-ring ring-2"></div>
                    <div class="radar-ring ring-3"></div>
                    <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" class="w-20 h-20 bike-float relative z-10" alt="Motorcycle">
                </div>
                <h2 class="text-xl font-black text-slate-900 uppercase italic">Scanning <span id="displayZone" class="text-orange-500">Zone</span>...</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Searching for nearby pickups</p>
                
                <div id="availableOrders" class="mt-8 space-y-4"></div>
            </div>

            <div id="activeState" class="hidden">
                <div class="bg-white p-8 rounded-[40px] border border-slate-100 shadow-xl relative overflow-hidden">
                    <div class="absolute top-4 right-6">
                        <span class="text-[8px] font-black bg-orange-500 text-white px-3 py-1 rounded-full uppercase animate-pulse">On Way</span>
                    </div>
                    
                    <div class="mb-8">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Pickup From</p>
                        <p id="activeBrand" class="text-2xl font-black text-slate-900 italic uppercase leading-none"></p>
                        
                        <div class="mt-6 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Deliver To</p>
                            <div class="flex items-start gap-3">
                                <i class="fas fa-location-dot text-orange-500 mt-1"></i>
                                <p id="activeAddr" class="text-xs text-slate-700 font-bold uppercase tracking-tight leading-relaxed"></p>
                            </div>
                        </div>
                    </div>

                    <div class="p-4 bg-emerald-50 rounded-2xl mb-8 flex justify-between items-center border border-emerald-100">
                        <span class="text-[9px] font-black text-emerald-600 uppercase tracking-widest">Order Earning</span>
                        <span class="text-xl font-black text-emerald-700">₹40.00</span>
                    </div>

                    <button onclick="completeOrder()" class="w-full bg-slate-900 text-white font-black py-5 rounded-[25px] shadow-2xl hover:bg-emerald-600 transition-all flex items-center justify-center gap-3 group text-sm tracking-widest">
                        <span>DELIVERY COMPLETE</span>
                        <i class="fas fa-check-circle group-hover:scale-110 transition-transform"></i>
                    </button>
                </div>
            </div>

            <div id="successState" class="hidden text-center py-12">
                <div class="w-24 h-24 bg-emerald-500 text-white rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-2xl shadow-emerald-200 transform hover:scale-110 transition-transform cursor-default">
                    <i class="fas fa-coins"></i>
                </div>
                <h2 class="text-2xl font-black italic uppercase text-slate-900">Payment Secured!</h2>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-2">₹40 Credit has been added to wallet</p>
                
                <button onclick="resetDashboard()" class="mt-10 w-full bg-slate-900 text-white font-black py-5 rounded-[25px] shadow-lg text-xs tracking-[0.2em] hover:bg-orange-500 transition-all">
                    GO BACK ONLINE
                </button>
            </div>
        </section>
    </div>

    <script>
        // --- 1. PROFILE & ZONE SELECTION LOGIC ---
        let activeDriverName = localStorage.getItem('activeDriverName');
        let activeDriverZone = localStorage.getItem('activeDriverZone');

        if (!activeDriverName || !activeDriverZone) {
            document.getElementById('driverProfileModal').classList.remove('hidden');
        } else {
            setupUIFromProfile();
            startAutoRefresh();
        }

        function saveDriverProfile() {
            const selectedName = document.querySelector('input[name="driverProfile"]:checked');
            if(!selectedName) return alert("Please select a driver profile!");
            
            activeDriverName = selectedName.value;
            activeDriverZone = document.getElementById('driverZone').value;
            
            localStorage.setItem('activeDriverName', activeDriverName);
            localStorage.setItem('activeDriverZone', activeDriverZone);
            
            setupUIFromProfile();
            document.getElementById('driverProfileModal').classList.add('hidden');
            
            startAutoRefresh(); 
        }

        function setupUIFromProfile() {
            const displayZoneText = activeDriverZone === 'All Regions' ? 'Global' : activeDriverZone;
            document.getElementById('driverNameDisplay').innerText = `${displayZoneText} | ${activeDriverName.split(' ')[0]}`;
            document.getElementById('displayZone').innerText = activeDriverZone;
        }

        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            document.getElementById('toastMsg').innerText = msg; 
            t.classList.add('show'); 
            setTimeout(() => t.classList.remove('show'), 4000); 
        }

        // --- 2. FILTERED ORDER RADAR LOGIC ---
        let totalEarnings = parseInt(localStorage.getItem('deliveryEarnings')) || 0;
        let map, refreshTimer, currentOrderId = null;
        let isBusy = false;
        let previousOrderCount = 0;
        
        let currentAvailableOrders = []; 

        document.getElementById('walletBalance').innerText = `₹${totalEarnings}`;

        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(loadAvailable, 4000);
            loadAvailable();
        }

        async function loadAvailable() {
            if (isBusy) return;
            const container = document.getElementById('availableOrders');
            try {
                const res = await fetch('/api/delivery/available');
                const allGlobalOrders = await res.json();
                
                // 🛑 FILTER LOGIC: IF "ALL REGIONS" IS SELECTED, SHOW EVERYTHING
                currentAvailableOrders = allGlobalOrders.filter(o => {
                    if (activeDriverZone === 'All Regions') return true;
                    
                    const addressString = o.address ? o.address.toLowerCase() : '';
                    return addressString.includes(activeDriverZone.toLowerCase());
                });
                
                // 🔔 NOTIFICATION SYSTEM
                if (currentAvailableOrders.length > previousOrderCount) {
                    document.getElementById('orderDing').play();
                    const zoneNotifText = activeDriverZone === 'All Regions' ? 'the Network' : activeDriverZone;
                    showToast(`New Pickup available in ${zoneNotifText}!`);
                }
                previousOrderCount = currentAvailableOrders.length;
                
                if (currentAvailableOrders.length === 0) {
                    const noOrderText = activeDriverZone === 'All Regions' ? 'Any Region' : activeDriverZone;
                    container.innerHTML = `<div class="py-10 opacity-30 bg-white rounded-3xl border border-dashed border-slate-200 mt-4"><i class="fas fa-box-open text-3xl mb-2 text-slate-400"></i><p class="text-[9px] font-black tracking-widest text-slate-500 uppercase">No Orders in ${noOrderText}</p></div>`;
                    return;
                }

                container.innerHTML = currentAvailableOrders.map(o => {
                    const safeAddr = o.address ? o.address.replace(/'/g, "\\'") : 'Location';
                    const safeBrand = o.brand ? o.brand.replace(/'/g, "\\'") : 'Kitchen';
                    
                    return `
                    <div class="bg-white p-5 rounded-[30px] border border-slate-100 shadow-sm text-left flex justify-between items-center hover:border-orange-500 transition-all group cursor-pointer">
                        <div class="flex-1 pr-4">
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">${o.brand}</p>
                            <p class="text-[11px] font-bold text-slate-600 truncate uppercase w-48">${o.address}</p>
                        </div>
                        <button onclick="acceptOrder('${o._id}')" class="bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest group-hover:bg-orange-500 transition-all shadow-md">Pickup</button>
                    </div>`
                }).join('');
            } catch (err) { console.error("Could not fetch orders."); }
        }

        // --- 3. ACCEPT & MAP LOGIC ---
        async function acceptOrder(id) {
            isBusy = true;
            currentOrderId = id;
            clearInterval(refreshTimer);

            const selectedOrder = currentAvailableOrders.find(o => o._id === id);
            if (!selectedOrder) return;

            try {
                // 1. Assign specific driver profile name to the order
                await fetch(`/api/order/${id}/deliveryBoy`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ deliveryBoy: activeDriverName })
                });

                // 2. Change status
                await fetch(`/api/order/${id}/status`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: 'Out for Delivery' })
                });

                // 3. UI Updates using safe memory data
                document.getElementById('activeBrand').innerText = selectedOrder.brand;
                document.getElementById('activeAddr').innerText = selectedOrder.address;
                
                showState('active');
                
                document.getElementById('map').style.display = 'block';
                initMap();
                
                setTimeout(() => { if (map) map.invalidateSize(); }, 400);

            } catch(e) {
                alert("Failed to connect to server.");
                resetDashboard();
            }
        }

        function initMap() {
            if (map) { map.remove(); }
            if (typeof L === 'undefined') return;

            map = L.map('map', {zoomControl: false}).setView([20.3851, 72.9115], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            L.marker([20.3851, 72.9115]).addTo(map).bindPopup('<b>Kitchen</b>').openPopup();
            L.marker([20.3950, 72.9200]).addTo(map).bindPopup('<b>Customer</b>');
        }

        // --- 4. COMPLETION LOGIC ---
        async function completeOrder() {
            try {
                const res = await fetch(`/api/delivery/complete/${currentOrderId}`, { method: 'PATCH' });
                
                if(res.ok) {
                    totalEarnings += 40;
                    localStorage.setItem('deliveryEarnings', totalEarnings);
                    document.getElementById('walletBalance').innerText = `₹${totalEarnings}`;
                    
                    document.getElementById('map').style.display = 'none';
                    showState('success');
                }
            } catch(e) { alert("Failed to complete delivery."); }
        }

        function resetDashboard() {
            isBusy = false;
            currentOrderId = null;
            previousOrderCount = 0; // Reset so new scans work correctly
            showState('searching');
            startAutoRefresh();
        }

        function showState(state) {
            document.getElementById('searchingState').classList.toggle('hidden', state !== 'searching');
            document.getElementById('activeState').classList.toggle('hidden', state !== 'active');
            document.getElementById('successState').classList.toggle('hidden', state !== 'success');
        }

        function simulateWithdraw() {
            if(totalEarnings <= 0) return alert("No funds available to withdraw!");
            const btn = event.currentTarget;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
            
            setTimeout(() => {
                alert(`Bank Transfer Successful: ₹${totalEarnings} sent!`);
                totalEarnings = 0;
                localStorage.setItem('deliveryEarnings', 0);
                document.getElementById('walletBalance').innerText = `₹0`;
                btn.innerHTML = `<i class="fas fa-money-bill-transfer"></i>`;
            }, 2000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
